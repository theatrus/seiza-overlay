name: Release npm package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact package.json version to release
        required: true
        type: string
      dry_run:
        description: Verify without publishing or creating a GitHub release
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Verify requested version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: test "$(node --print "require('./package.json').version")" = "$REQUESTED_VERSION"
      - run: npm ci
      - run: npm run check
      - run: npm pack --dry-run
      - name: Check npm registry
        id: registry
        env:
          PACKAGE_VERSION: ${{ inputs.version }}
        run: |
          if npm view "@seiza/astro-overlay@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm with provenance
        if: inputs.dry_run == false && steps.registry.outputs.exists != 'true'
        run: npm publish --access public --provenance
      - name: Create GitHub release
        if: inputs.dry_run == false
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ inputs.version }}
        run: gh release view "v$PACKAGE_VERSION" || gh release create "v$PACKAGE_VERSION" --target "$GITHUB_SHA" --generate-notes
